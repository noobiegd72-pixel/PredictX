<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictX | Las apuestas de la clase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #030305;
            --card: #0d0f14;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
            --error: #f43f5e;
            --text: #f8fafc;
            --text-muted: #64748b;
            --border: #1e293b;
            --glass: rgba(13, 15, 20, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- NOTIFICACIONES --- */
        #notification-container {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }

        .toast {
            background: var(--card); border: 1px solid var(--border); padding: 14px 24px;
            border-radius: 12px; color: var(--text); font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center;
            gap: 12px; animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto; min-width: 300px; backdrop-filter: blur(10px);
        }

        @keyframes toastIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0; } }

        /* --- HEADER & NAV --- */
        nav {
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            z-index: 100; position: relative;
        }

        .btn {
            padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }

        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

        /* --- VIEWS --- */
        .view { position: absolute; inset: 75px 0 0 0; padding: 30px; transition: 0.5s; overflow-y: auto; }
        .view-hidden { transform: translateX(50px); opacity: 0; pointer-events: none; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* --- UI CARDS --- */
        .main-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 32px;
            padding: 50px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .timer-badge {
            background: rgba(99, 102, 241, 0.1); color: var(--accent);
            padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;
        }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin: 40px 0; }

        .opt-btn {
            background: #161a23; border: 2px solid var(--border); padding: 20px;
            border-radius: 18px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between;
        }
        .opt-btn.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.15); }

        /* --- ADMIN WINDOW --- */
        #admin-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .admin-window {
            background: var(--card); width: 90vw; max-width: 780px; height: 580px;
            border: 1px solid var(--border); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
        }

        .admin-nav { display: flex; background: #11141b; border-bottom: 1px solid var(--border); }
        .admin-nav-item { padding: 15px 25px; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .admin-nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .stats-banner {
            background: rgba(99, 102, 241, 0.05); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between;
        }

        input { background: #161a23; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; }
        
        .hist-item {
            background: var(--card); border: 1px solid var(--border); padding: 20px;
            border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="notification-container"></div>

<nav>
    <div style="display: flex; gap: 10px;">
        <input type="password" id="adminPass" placeholder="Acceso Admin..." style="width: 140px; font-size: 0.75rem;">
        <button class="btn btn-ghost" onclick="tryOpenAdmin()">⚙️ Panel</button>
    </div>
    
    <div style="display: flex; gap: 15px; align-items: center;">
        <button class="btn btn-ghost" onclick="showView('inbox')">📥 Bandeja</button>
        <button class="btn btn-ghost" onclick="showView('main')">🎲 Apuestas</button>
        <div id="balanceDisp" style="font-weight: 800; color: var(--success); background: rgba(16,185,129,0.1); padding: 8px 18px; border-radius: 12px; border: 1px solid rgba(16,185,129,0.2);">8.000 CR</div>
    </div>
</nav>

<div id="view-main" class="view">
    <div class="container">
        <div class="main-card">
            <span class="timer-badge" id="timer">CARGANDO TIEMPO...</span>
            <h1 id="q-text" style="font-size: 2.5rem; margin: 20px 0 10px 0; font-weight: 800;">Conectando...</h1>
            <p id="odds-summary" style="color: var(--text-muted);">Espera a que el administrador cree una apuesta</p>
            <div class="options-grid" id="options-box"></div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid var(--border); padding-top: 30px;">
                <input type="number" id="bet-val" value="1.000" min="0.001" step="0.5" style="width: 120px; font-size: 1.2rem; font-weight: 800;">
                <button class="btn btn-primary" onclick="executeBet()" style="padding: 18px 45px;">APOSTAR</button>
            </div>
        </div>
    </div>
</div>

<div id="view-inbox" class="view view-hidden">
    <div class="container">
        <h2 style="margin-bottom: 25px;">Tus apuestas</h2>
        <div id="history-container"></div>
    </div>
</div>

<div id="admin-overlay">
    <div class="admin-window">
        <div class="admin-nav">
            <div class="admin-nav-item active" onclick="switchAdminTab(this, 'create')">Gestión</div>
            <div class="admin-nav-item" onclick="switchAdminTab(this, 'queue')">Cola</div>
            <button onclick="closeAdmin()" style="margin-left: auto; background:none; border:none; color:white; padding:15px; cursor:pointer;">✕</button>
        </div>
        
        <div class="admin-content" id="adm-tab-create">
            <div class="stats-banner">
                <div><span>APUESTAS HOY</span><br><strong id="adm-total-bets">0</strong></div>
                <div style="text-align: right;"><span>ACERTANTES ÚLTIMA</span><br><strong id="adm-last-winners" style="color: var(--success);">--</strong></div>
            </div>
            <input type="text" id="adm-q-input" placeholder="Pregunta..." style="margin-bottom: 10px;">
            <div id="adm-options-list">
                <div style="display:grid; grid-template-columns: 1fr 100px; gap:10px; margin-bottom:5px;">
                    <input type="text" placeholder="Opción" class="on">
                    <input type="number" placeholder="1.000" class="oo" step="0.001">
                </div>
            </div>
            <button class="btn btn-ghost" onclick="addOptionRow()" style="width:100%; margin:10px 0;">+ Opción</button>
            <button class="btn btn-primary" onclick="saveToGlobalQueue()" style="width:100%;">Añadir a la Cola Global</button>
            
            <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                <h4 style="color:var(--success)">Resolver Activa</h4>
                <div id="adm-resolve-checks" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;"></div>
                <button class="btn btn-ghost" onclick="resolveGlobalBet()" style="width:100%; color:var(--success); border-color:var(--success)">Validar y Siguiente</button>
            </div>
        </div>

        <div class="admin-content" id="adm-tab-queue" style="display:none;">
            <h4>Cola de Espera Global</h4>
            <div id="queue-list-container" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBo_HqMcBYGc6bI6xHfeKllOAfxH-qO6zM",
        authDomain: "predictx-clase.firebaseapp.com",
        databaseURL: "https://predictx-clase-default-rtdb.firebaseio.com", 
        projectId: "predictx-clase",
        storageBucket: "predictx-clase.firebasestorage.app",
        messagingSenderId: "109290007889",
        appId: "1:109290007889:web:b0b238303ab823457ef770"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ESTADO LOCAL ---
    let localUserData = JSON.parse(localStorage.getItem('px_user_v7')) || {
        balance: 8.000,
        history: []
    };

    let globalState = { current: null, queue: [], lastResults: null };
    let userSelection = [];

    // --- SYNC CON FIREBASE ---
    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        globalState.current = data.currentBet || null;
        globalState.queue = data.queue ? Object.values(data.queue) : [];
        globalState.lastResults = data.lastResults || null;
        
        if(globalState.lastResults) {
            processWinningBets(globalState.lastResults);
            document.getElementById('adm-last-winners').innerText = globalState.lastResults.winnersCount + " Acertaron";
        }
        
        renderMain();
        renderAdminTools();
        renderQueue();
    });

    // --- FUNCIONES UI ---
    function renderMain() {
        const box = document.getElementById('options-box');
        const qText = document.getElementById('q-text');
        const summary = document.getElementById('odds-summary');
        document.getElementById('balanceDisp').innerText = `${localUserData.balance.toFixed(3)} CR`;
        box.innerHTML = '';

        if (!globalState.current || globalState.current.status === 'resolved') {
            qText.innerText = "No hay apuestas hoy";
            summary.innerText = "Espera a que el administrador cree una apuesta";
            return;
        }

        qText.innerText = globalState.current.question;
        globalState.current.options.forEach((o, i) => {
            const btn = document.createElement('div');
            btn.className = `opt-btn ${userSelection.includes(i) ? 'active' : ''}`;
            btn.innerHTML = `<span>${o.name}</span> <span style="font-weight:800; color:var(--success)">x${parseFloat(o.odds).toFixed(3)}</span>`;
            btn.onclick = () => {
                if(userSelection.includes(i)) userSelection = userSelection.filter(x => x !== i);
                else userSelection.push(i);
                renderMain();
            };
            box.appendChild(btn);
        });

        if(userSelection.length > 0) {
            const odds = userSelection.reduce((acc, idx) => acc * globalState.current.options[idx].odds, 1);
            summary.innerText = `Multiplicador total: x${odds.toFixed(3)}`;
        }
    }

    function executeBet() {
        const amount = parseFloat(document.getElementById('bet-val').value);
        if(!globalState.current) return notify("No hay apuesta activa", "error");
        if(userSelection.length === 0) return notify("Selecciona opciones", "info");
        if(amount > localUserData.balance) return notify("Saldo insuficiente", "error");

        const odds = userSelection.reduce((acc, idx) => acc * globalState.current.options[idx].odds, 1);
        
        localUserData.balance -= amount;
        localUserData.history.unshift({
            betId: globalState.current.id,
            question: globalState.current.question,
            picks: userSelection.map(i => globalState.current.options[i].name),
            pickIndices: [...userSelection],
            odds: odds,
            amount: amount,
            status: 'PENDIENTE'
        });

        saveLocal();
        userSelection = [];
        renderMain();
        notify("¡Apuesta registrada!", "success");
    }

    function processWinningBets(results) {
        let changed = false;
        localUserData.history.forEach(h => {
            if(h.betId === results.betId && h.status === 'PENDIENTE') {
                const isWon = h.pickIndices.every(p => results.winners.includes(p));
                if(isWon) {
                    localUserData.balance += (h.amount * h.odds);
                    h.status = 'GANADA';
                    notify(`¡Ganaste ${(h.amount * h.odds).toFixed(3)} CR!`, "success");
                } else {
                    h.status = 'PERDIDA';
                }
                changed = true;
            }
        });
        if(changed) saveLocal();
    }

    // --- ADMIN LOGIC ---
    function saveToGlobalQueue() {
        const q = document.getElementById('adm-q-input').value;
        const names = document.querySelectorAll('.on');
        const odds = document.querySelectorAll('.oo');
        let options = [];
        names.forEach((n, i) => { if(n.value) options.push({ name: n.value, odds: parseFloat(odds[i].value) || 1.1 }); });

        if(!q) return notify("Pregunta vacía", "error");

        const newBet = { id: Date.now(), question: q, options, status: 'active' };

        if(!globalState.current || globalState.current.status === 'resolved') {
            db.ref('currentBet').set(newBet);
        } else {
            db.ref('queue').push(newBet);
        }
        notify("Añadido al sistema global", "success");
    }

    function resolveGlobalBet() {
        const checks = document.querySelectorAll('.resolve-chk');
        let winners = [];
        checks.forEach(c => { if(c.checked) winners.push(parseInt(c.value)) });

        if(winners.length === 0) return notify("Marca los ganadores", "info");

        // 1. Notificar ganadores
        db.ref('lastResults').set({
            betId: globalState.current.id,
            winners: winners,
            winnersCount: Math.floor(Math.random()*5) + 1 // Solo visual
        });

        // 2. Pasar al siguiente de la cola
        if(globalState.queue.length > 0) {
            const nextBet = globalState.queue[0];
            // Eliminar el primero de la cola (usamos la key de Firebase)
            db.ref('queue').limitToFirst(1).once('value', s => {
                const key = Object.keys(s.val())[0];
                db.ref('queue/' + key).remove();
                db.ref('currentBet').set(nextBet);
            });
        } else {
            db.ref('currentBet/status').set('resolved');
        }
    }

    function renderQueue() {
        const container = document.getElementById('queue-list-container');
        container.innerHTML = globalState.queue.length ? '' : 'Vacía';
        globalState.queue.forEach(b => {
            container.innerHTML += `<div style="background:#11141b; padding:10px; border-radius:10px; margin-bottom:5px; border:1px solid var(--border);">${b.question}</div>`;
        });
    }

    function renderAdminTools() {
        const box = document.getElementById('adm-resolve-checks');
        box.innerHTML = '';
        if(globalState.current && globalState.current.status === 'active') {
            globalState.current.options.forEach((o, i) => {
                box.innerHTML += `<label style="background:#11141b; padding:10px; border-radius:8px; cursor:pointer;"><input type="checkbox" class="resolve-chk" value="${i}"> ${o.name}</label>`;
            });
        }
    }

    // --- HELPERS ---
    function updateTimer() {
        const now = new Date();
        const midnight = new Date();
        midnight.setUTCHours(22, 0, 0, 0); 
        if(now > midnight) midnight.setDate(midnight.getDate() + 1);
        const diff = midnight - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2,'0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        document.getElementById('timer').innerText = `PRÓXIMA APUESTA EN ${h}:${m}:${s}`;
    }

    function notify(msg, type) {
        const c = document.getElementById('notification-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(() => { t.style.animation = 'toastOut 0.4s forwards'; setTimeout(()=>t.remove(), 400); }, 3000);
    }

    function showView(v) {
        document.getElementById('view-main').className = v === 'main' ? 'view' : 'view view-hidden';
        document.getElementById('view-inbox').className = v === 'inbox' ? 'view' : 'view view-hidden';
        if(v === 'inbox') renderHistory();
    }

    function switchAdminTab(el, tab) {
        document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('adm-tab-create').style.display = tab === 'create' ? 'block' : 'none';
        document.getElementById('adm-tab-queue').style.display = tab === 'queue' ? 'block' : 'none';
    }

    function tryOpenAdmin() {
        if(document.getElementById('adminPass').value === "Isaias2013Cerrado") document.getElementById('admin-overlay').style.display = 'flex';
        else notify("Contraseña incorrecta", "error");
    }

    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }
    function addOptionRow() {
        const div = document.createElement('div');
        div.style = "display:grid; grid-template-columns: 1fr 100px; gap:10px; margin-bottom:5px;";
        div.innerHTML = `<input type="text" placeholder="Opción" class="on"><input type="number" placeholder="1.000" class="oo" step="0.001">`;
        document.getElementById('adm-options-list').appendChild(div);
    }
    function saveLocal() { localStorage.setItem('px_user_v7', JSON.stringify(localUserData)); }
    function renderHistory() {
        const c = document.getElementById('history-container');
        c.innerHTML = localUserData.history.map(h => `
            <div class="hist-item">
                <div><strong>${h.question}</strong><br><small>${h.picks.join(', ')}</small></div>
                <div style="text-align:right"><span style="color:${h.status==='GANADA'?'#10b981':'#f43f5e'}">${h.status}</span><br><strong>${h.amount.toFixed(3)}</strong></div>
            </div>
        `).join('');
    }

    setInterval(updateTimer, 1000);
    renderMain();
</script>
</body>
</html>
