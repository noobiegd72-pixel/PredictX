<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictX v1.6 | Las apuestas de la clase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #030305 0%, #0b0c13 100%); 
            --card: rgba(13, 15, 20, 0.6); 
            --accent: #6366f1; 
            --accent-hover: #818cf8;
            --success: #10b981; 
            --error: #f43f5e; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --border: rgba(30, 41, 59, 0.7); 
            --glass: rgba(10, 12, 16, 0.85);
            --shadow-subtle: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text); height: 100vh; overflow: hidden; position: relative; }

        .version-tag { position: fixed; bottom: 20px; right: 25px; color: var(--text-muted); font-weight: 800; font-size: 0.9rem; z-index: 1000; pointer-events: none; opacity: 0.6; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* NOTIFICACIONES */
        #notification-container { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 450px; }
        .toast { background: var(--card); border: 1px solid var(--border); padding: 16px 24px; border-radius: 16px; color: var(--text); font-size: 0.95rem; font-weight: 600; box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: flex; align-items: center; gap: 12px; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto; backdrop-filter: blur(12px); border-left: 4px solid var(--accent); }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }

        /* NAVEGACIÓN Y BOTONES */
        nav { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 100; position: relative; animation: fadeIn 0.8s ease; }
        .btn { padding: 12px 22px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); background: var(--accent-hover); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid transparent; }
        .btn-ghost:hover { border-color: var(--border); color: var(--text); background: rgba(255,255,255,0.03); }

        /* VISTAS */
        .view { position: absolute; inset: 75px 0 0 0; padding: 40px 20px; transition: all 0.5s ease; overflow-y: auto; }
        .view-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; visibility: hidden; }
        .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 60px; }
        .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 40px; text-align: center; box-shadow: var(--shadow-subtle); backdrop-filter: blur(10px); animation: slideUp 0.6s; }

        /* BADGES Y OPCIONES */
        .badges-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .badge { padding: 6px 14px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .badge-timer { background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid rgba(99, 102, 241, 0.2); }
        .badge-close { background: rgba(244, 63, 94, 0.1); color: var(--error); border: 1px solid rgba(244, 63, 94, 0.2); }
        
        /* Modificado para soportar secciones completas */
        .options-wrapper { text-align: left; margin: 30px 0; }
        .section-header { font-size: 1.1rem; color: var(--accent); font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 25px; margin-bottom: 15px; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 15px;}
        
        .opt-btn { background: rgba(22, 26, 35, 0.7); border: 2px solid var(--border); padding: 20px; border-radius: 18px; cursor: pointer; display: flex; justify-content: space-between; transition: all 0.25s; align-items: center; }
        .opt-btn:hover:not(.disabled) { border-color: var(--accent); transform: translateY(-3px); background: rgba(28, 33, 44, 0.9); }
        .opt-btn.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.12); box-shadow: 0 0 25px rgba(99, 102, 241, 0.15); }
        .opt-btn.disabled { opacity: 0.4; cursor: not-allowed; }

        /* INPUTS Y NOTAS */
        input[type="number"], input[type="text"], input[type="password"], input[type="datetime-local"] { background: rgba(22, 26, 35, 0.8); border: 1px solid var(--border); color: white; padding: 14px 18px; border-radius: 12px; width: 100%; font-weight: 600; outline: none; transition: 0.3s; font-size: 0.95rem; }
        input:focus { border-color: var(--accent); background: rgba(28, 33, 44, 1); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .hist-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; animation: slideUp 0.4s ease-out; backdrop-filter: blur(10px); }

        /* PANEL ADMIN */
        #admin-overlay, #users-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(15px); }
        #admin-overlay.open, #users-modal-overlay.open { display: flex; animation: fadeIn 0.3s forwards; }
        .admin-window { background: var(--bg-gradient); width: 95vw; max-width: 850px; height: 85vh; border-radius: 28px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .admin-nav { display: flex; background: rgba(10, 12, 16, 0.9); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .admin-nav-item { padding: 18px 24px; cursor: pointer; color: var(--text-muted); font-weight: 700; font-size: 0.85rem; transition: 0.3s; white-space: nowrap; border-bottom: 3px solid transparent; }
        .admin-nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,255,255,0.02); }
        .admin-content { flex: 1; padding: 30px; overflow-y: auto; }
        .admin-bet-card { background: rgba(22, 26, 35, 0.5); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 20px; }

        .creator-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="version-tag">v1.6</div>
<div id="notification-container"></div>

<nav>
    <div style="display: flex; gap: 8px; align-items: center;">
        <input type="password" id="adminPass" placeholder="Contraseña Admin" style="width: 140px; font-size: 0.75rem; padding: 10px 12px;">
        <button class="btn btn-ghost" onclick="tryOpenAdmin()">⚙️ Panel</button>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button class="btn btn-ghost" onclick="showView('inbox')">📥 Historial</button>
        <button class="btn btn-ghost" onclick="showView('main')" style="border-color: var(--border); background: rgba(255,255,255,0.03);">🎲 Eventos</button>
        <div id="balanceDisp" style="font-weight: 800; color: var(--success); background: rgba(16,185,129,0.1); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(16,185,129,0.25);">--- CR</div>
    </div>
</nav>

<div id="view-main" class="view">
    <div style="text-align: center; margin-bottom: 20px;">
        <span class="badge badge-timer" id="global-queue-badge" style="display: none;">EN COLA: 0</span>
    </div>
    <div class="container" id="active-bets-container"></div>
</div>

<div id="view-inbox" class="view view-hidden">
    <div class="container" style="max-width: 800px;">
        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 30px; text-align: center; color: white;">Tu Historial de Apuestas</h2>
        <div id="history-container"></div>
    </div>
</div>

<div id="users-modal-overlay">
    <div class="admin-window" style="height: 70vh; max-width: 600px;">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h3 id="users-modal-title" style="color: white;">Detalles de Apuestas</h3>
            <button onclick="closeUsersModal()" class="btn btn-ghost">✕</button>
        </div>
        <div class="admin-content" id="users-modal-content"></div>
    </div>
</div>

<div id="admin-overlay">
    <div class="admin-window">
        <div class="admin-nav">
            <div class="admin-nav-item active" onclick="switchAdminTab(this, 'create')">➕ Crear / Editar Evento</div>
            <div class="admin-nav-item" onclick="switchAdminTab(this, 'resolve')">✔️ Resolver Eventos</div>
            <div class="admin-nav-item" onclick="switchAdminTab(this, 'queue')">📋 Cola Global</div>
            <button onclick="closeAdmin()" style="margin-left: auto; background:none; border:none; color:white; padding:15px 25px; cursor:pointer; font-size: 1.2rem;">✕</button>
        </div>
        
        <div class="admin-content" id="adm-tab-create">
            <input type="hidden" id="edit-bet-id">
            <div class="admin-stat-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                <div style="background: rgba(99,102,241,0.08); padding: 20px; border-radius: 16px; border: 1px solid rgba(99,102,241,0.2);">
                    <span style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800;">EVENTOS ACTIVOS</span><br>
                    <strong id="adm-count-active" style="font-size: 1.8rem; color: var(--accent);">0</strong>
                </div>
                <div style="background: rgba(16,185,129,0.08); padding: 20px; border-radius: 16px; border: 1px solid rgba(16,185,129,0.2);">
                    <span style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800;">APUESTAS GLOBALES</span><br>
                    <strong id="adm-count-total-bets" style="font-size: 1.8rem; color: var(--success);">0</strong>
                </div>
                <div style="background: rgba(244,63,94,0.08); padding: 20px; border-radius: 16px; border: 1px solid rgba(244,63,94,0.2);">
                    <span style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800;">HORA CIERRE</span><br>
                    <input type="datetime-local" id="adm-close-time" style="margin-top:8px; padding: 10px; font-size:0.8rem; background: rgba(0,0,0,0.5);">
                </div>
            </div>

            <div style="background: rgba(13, 15, 20, 0.8); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
                <input type="text" id="adm-q-input" placeholder="Pregunta (Ej: ¿Quién gana la carrera?)" style="margin-bottom: 15px; font-size: 1.05rem;">
                <label style="color:var(--text-muted); font-size:0.85rem; margin-bottom:15px; display:block;">
                    <input type="checkbox" id="adm-global-single"> Forzar TODA la apuesta a ser Selección Única
                </label>
                
                <div id="adm-options-list"></div>
                
                <div style="display:flex; gap: 8px; margin-top: 15px; flex-wrap:wrap;">
                    <button class="btn btn-ghost" onclick="addOptionRow('normal')" style="border: 1px dashed var(--border); font-size:0.75rem;">+ Opción Normal</button>
                    <button class="btn btn-ghost" onclick="addOptionRow('section')" style="border: 1px dashed var(--border); font-size:0.75rem;">+ Sección</button>
                    <button class="btn btn-ghost" onclick="addOptionRow('number')" style="border: 1px dashed var(--border); font-size:0.75rem;">+ Número</button>
                    <button class="btn btn-ghost" onclick="addOptionRow('range')" style="border: 1px dashed var(--border); font-size:0.75rem;">+ Rango</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px;">
                    <button class="btn btn-ghost" onclick="saveEvent(true)" style="border: 1px solid var(--accent); color:var(--accent); justify-content:center;">GUARDAR EN COLA</button>
                    <button class="btn btn-primary" onclick="saveEvent(false)" style="justify-content:center;">PUBLICAR/ACTUALIZAR HOY</button>
                </div>
            </div>
        </div>

        <div class="admin-content" id="adm-tab-resolve" style="display:none;">
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">Introduce los resultados reales y valida.</p>
            <div id="adm-resolve-list"></div>
        </div>

        <div class="admin-content" id="adm-tab-queue" style="display:none;">
            <div id="queue-list-container"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBo_HqMcBYGc6bI6xHfeKllOAfxH-qO6zM",
        authDomain: "predictx-clase.firebaseapp.com",
        databaseURL: "https://predictx-clase-default-rtdb.firebaseio.com", 
        projectId: "predictx-clase",
        storageBucket: "predictx-clase.firebasestorage.app",
        messagingSenderId: "109290007889",
        appId: "1:109290007889:web:b0b238303ab823457ef770"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================
    // ESTADO Y VARIABLES GLOBALES
    // ==========================================
    
    let uid = localStorage.getItem('px_uid');
    if (!uid) {
        uid = 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('px_uid', uid);
    }

    let localUserData = { balance: 8.000, history: {} };
    let globalData = { activeBets: {}, queue: [] };
    let allUsersData = {}; 
    let userSelections = {}; // Estructura: { betId: { opts: [0,2], nums: {3: "5"} } }
    let marketClosedStatus = {}; 

    // ==========================================
    // LISTENERS DE BASE DE DATOS
    // ==========================================

    db.ref('users/' + uid).on('value', snap => {
        const data = snap.val();
        if (data) {
            localUserData = data;
            if (!localUserData.history) localUserData.history = {};
        } else {
            db.ref('users/' + uid).set({ balance: 8.000, history: {} });
        }
        renderMain();
        renderHistory();
    });

    db.ref('users').on('value', snap => {
        allUsersData = snap.val() || {};
        updateAdminStats();
        if (document.getElementById('admin-overlay').classList.contains('open')) {
            renderAdminTools(); 
        }
    });

    db.ref('/').on('value', snap => {
        const data = snap.val() || {};
        globalData.activeBets = data.activeBets || {};
        globalData.queue = data.queue ? Object.values(data.queue) : [];

        if (Object.keys(globalData.activeBets).length === 0 && globalData.queue.length > 0) {
            autoMoveQueue();
        }

        if (data.lastResults) processResults(data.lastResults);

        const admCountElement = document.getElementById('adm-count-active');
        if (admCountElement) admCountElement.innerText = Object.keys(globalData.activeBets).length;
        
        const queueBadge = document.getElementById('global-queue-badge');
        if (queueBadge) {
            queueBadge.style.display = globalData.queue.length > 0 ? 'inline-block' : 'none';
            queueBadge.innerText = `EN COLA: ${globalData.queue.length}`;
        }

        updateAdminStats();
        renderMain();
        if (document.getElementById('admin-overlay').classList.contains('open')) {
            renderAdminTools();
            renderQueue();
        }
    });

    // ==========================================
    // FUNCIONES PRINCIPALES (VISTA EVENTOS)
    // ==========================================

    function autoMoveQueue() {
        db.ref('queue').limitToFirst(1).once('value', s => {
            if (s.val()) {
                const key = Object.keys(s.val())[0];
                const nextBet = s.val()[key];
                db.ref('queue/' + key).remove();
                db.ref('activeBets/' + nextBet.id).set(nextBet);
            }
        });
    }

    // Calcula la cuota en vivo
    function calculateOdds(betId) {
        let odds = 1.0;
        const bet = globalData.activeBets[betId];
        if(!bet) return odds;

        const sel = userSelections[betId] || { opts: [], nums: {} };
        
        // Opciones normales
        sel.opts.forEach(i => {
            if(bet.options[i]) odds *= parseFloat(bet.options[i].odds || 1.0);
        });

        // Opciones de numero/rango
        Object.keys(sel.nums).forEach(i => {
            let opt = bet.options[i];
            let val = parseFloat(sel.nums[i]);
            if(opt && !isNaN(val)) {
                let baseOdds = parseFloat(opt.odds || 1.1);
                let baseNum = parseFloat(opt.baseNum || 0);
                
                if(opt.type === 'number') {
                    // Si se aleja, sube la cuota (simulación básica)
                    odds *= (baseOdds + (Math.abs(val - baseNum) * 0.15));
                } else if (opt.type === 'range') {
                    let min = parseFloat(opt.min || 0);
                    let max = parseFloat(opt.max || 10);
                    if(val >= min && val <= max) {
                        // Rango más amplio = menor cuota
                        let rangeSize = Math.abs(max - min);
                        odds *= (baseOdds - (rangeSize * 0.02)); 
                    } else {
                        // Fuera de rango es inválido (lo reseteamos luego, pero por ahora no da cuota extra)
                        odds *= 1.0;
                    }
                }
            }
        });
        return Math.max(1.00, odds); // Minimo 1.00
    }

    function renderMain() {
        const container = document.getElementById('active-bets-container');
        document.getElementById('balanceDisp').innerText = `${(localUserData.balance || 0).toFixed(3)} CR`;
        const activeBetKeys = Object.keys(globalData.activeBets);

        if (activeBetKeys.length === 0) {
            container.innerHTML = `
                <div class="main-card" style="padding: 60px 30px;">
                    <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; color: var(--text-muted);">Sin eventos</h1>
                    <p style="color: var(--text-muted); font-size: 1.1rem;">No hay apuestas activas en este momento. Revisa más tarde.</p>
                </div>`;
            return;
        }

        let htmlContent = '';
        
        // Inicializar selecciones si no existen
        activeBetKeys.forEach(betId => { 
            if (!userSelections[betId] || Array.isArray(userSelections[betId])) {
                userSelections[betId] = { opts: [], nums: {} };
            }
        });

        activeBetKeys.forEach(betId => {
            const bet = globalData.activeBets[betId];
            const hasBet = localUserData.history && localUserData.history[betId];
            const isClosed = marketClosedStatus[betId];
            let currentOdds = calculateOdds(betId);

            let cardHtml = `
                <div class="main-card" id="card-${betId}">
                    <div class="badges-row"><span class="badge badge-close" id="timer-close-${betId}">CALCULANDO...</span></div>
                    <h1 style="font-size: 2.4rem; font-weight: 800; margin-bottom: 10px;">${bet.question}</h1>
                    <div class="options-wrapper" id="options-box-${betId}">
            `;

            let currentSectionSingle = bet.isGlobalSingle;
            let currentGridOpen = false;

            // Retrocompatibilidad: Si no hay 'options' sino un array simple
            let optsArray = bet.options || [];

            optsArray.forEach((opcion, i) => {
                // Retrocompatibilidad con apuestas antiguas sin tipo
                let optType = opcion.type || 'normal';

                if (optType === 'section') {
                    if (currentGridOpen) { cardHtml += `</div>`; currentGridOpen = false; }
                    currentSectionSingle = bet.isGlobalSingle || opcion.isSingle;
                    cardHtml += `<div class="section-header">${opcion.name} ${currentSectionSingle ? '<span style="font-size:0.7rem; color:var(--text-muted);">(Selección Única)</span>' : ''}</div>`;
                } 
                else if (optType === 'normal') {
                    if (!currentGridOpen) { cardHtml += `<div class="options-grid">`; currentGridOpen = true; }
                    let isActive = userSelections[betId].opts.includes(i);
                    let btnClass = 'opt-btn' + (isActive ? ' active' : '') + (hasBet ? ' disabled' : '');
                    cardHtml += `
                        <div class="${btnClass}" onclick="toggleSelection('${betId}', ${i}, ${currentSectionSingle}, ${hasBet || isClosed})">
                            <span>${opcion.name}</span> 
                            <span style="font-weight:800; color:var(--success)">x${parseFloat(opcion.odds || 1.1).toFixed(3)}</span>
                        </div>`;
                }
                else if (optType === 'number' || optType === 'range') {
                    if (currentGridOpen) { cardHtml += `</div>`; currentGridOpen = false; }
                    let uVal = userSelections[betId].nums[i] || '';
                    let placeholder = optType === 'number' ? `Número (Base: ${opcion.baseNum})` : `Rango (${opcion.min} a ${opcion.max})`;
                    
                    cardHtml += `
                        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px;">
                            <label style="display:block; color:var(--text-muted); font-size:0.85rem; margin-bottom:8px;">${opcion.name} <span style="color:var(--accent); font-weight:bold;">(Cuota Base x${opcion.odds})</span></label>
                            <input type="number" placeholder="${placeholder}" value="${uVal}" 
                                   onchange="updateNumSelection('${betId}', ${i}, this.value, '${optType}', ${opcion.min}, ${opcion.max}, ${opcion.baseNum})" 
                                   ${hasBet || isClosed ? 'disabled' : ''}>
                        </div>
                    `;
                }
            });
            if (currentGridOpen) cardHtml += `</div>`;

            let btnText = isClosed ? "MERCADO CERRADO" : (hasBet ? "YA APOSTASTE AQUÍ" : "CONFIRMAR APUESTA");
            let btnStyle = isClosed ? "background: var(--border); color: var(--text-muted);" : 
                           (hasBet ? "background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid rgba(16,185,129,0.3);" : "");
            
            cardHtml += `</div>
                    <div style="display: flex; justify-content: center; gap: 20px; border-top: 1px solid var(--border); padding-top: 30px; align-items: flex-end; margin-top: 10px; flex-wrap: wrap;">
                        <div style="text-align: left;">
                            <label style="font-size: 0.65rem; color: var(--text-muted); font-weight: 800; display: block; margin-bottom: 8px;">CRÉDITOS APOSTADOS</label>
                            <input type="number" id="bet-val-${betId}" value="1.000" step="0.100" style="width: 140px; font-weight: 800; font-size: 1.2rem; text-align: center;" ${hasBet || isClosed ? 'disabled' : ''}>
                            <span style="display: block; margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">Cuota: <span style="color:var(--accent);">x${currentOdds.toFixed(3)}</span></span>
                            <span style="display: block; margin-top: 3px; font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">Ganancias Potenciales: <span id="win-pot-${betId}" style="color:var(--success);">+${(1.000 * currentOdds).toFixed(3)} CR</span></span>
                        </div>
                        <button class="btn btn-primary" ${isClosed || hasBet ? 'disabled' : ''} style="padding: 0 40px; height: 55px; font-size: 0.95rem; border-radius: 14px; ${btnStyle}" onclick="executeBet('${betId}')">${btnText}</button>
                    </div>
                </div>`;
            htmlContent += cardHtml;
        });

        // Guardar valores del input de dinero para no perderlos al renderizar
        let savedInputs = {};
        activeBetKeys.forEach(id => { const el = document.getElementById(`bet-val-${id}`); if (el) savedInputs[id] = el.value; });
        
        container.innerHTML = htmlContent;
        
        activeBetKeys.forEach(id => { 
            const el = document.getElementById(`bet-val-${id}`); 
            if (el && savedInputs[id]) el.value = savedInputs[id]; 
            // Añadir listener para calcular ganancias en tiempo real
            if(el) {
                el.addEventListener('input', () => {
                    let val = parseFloat(el.value || 0);
                    let odds = calculateOdds(id);
                    document.getElementById(`win-pot-${id}`).innerText = `+${(val * odds).toFixed(3)} CR`;
                });
            }
        });
    }

    window.toggleSelection = function(betId, optionIndex, isSingle, isBlocked) {
        if (isBlocked) return;
        const sel = userSelections[betId];
        
        if (isSingle) {
            // Simplificación: Si es single, limpia las opciones normales previas 
            // (Para ser perfecto limpiaría solo las de su sección, pero así evita trampas globales)
            sel.opts = [optionIndex];
        } else {
            if(sel.opts.includes(optionIndex)) {
                sel.opts = sel.opts.filter(x => x !== optionIndex);
            } else {
                sel.opts.push(optionIndex);
            }
        }
        renderMain(); 
    };

    window.updateNumSelection = function(betId, idx, val, type, min, max, base) {
        let num = parseFloat(val);
        if(isNaN(num)) num = base || 0; // Fallback
        
        // Si es rango, forzar límites
        if(type === 'range') {
            if(num < min) num = min;
            if(num > max) num = max;
        }

        userSelections[betId].nums[idx] = num.toString();
        renderMain();
    }

    function executeBet(betId) {
        const bet = globalData.activeBets[betId];
        const amount = parseFloat(document.getElementById(`bet-val-${betId}`).value);
        const sel = userSelections[betId];

        if (sel.opts.length === 0 && Object.keys(sel.nums).length === 0) return notify("Selecciona al menos una opción o número", "error");
        if (isNaN(amount) || amount <= 0) return notify("Cantidad inválida", "error");
        if (amount > localUserData.balance) return notify("Saldo insuficiente", "error");

        const finalOdds = calculateOdds(betId);
        
        // Formatear las selecciones para el historial
        let picksNames = [];
        sel.opts.forEach(i => picksNames.push(bet.options[i].name));
        Object.keys(sel.nums).forEach(i => picksNames.push(`${bet.options[i].name}: ${sel.nums[i]}`));

        localUserData.balance -= amount;
        localUserData.history[betId] = {
            id: betId, 
            question: bet.question, 
            picks: picksNames,
            opts: [...sel.opts], 
            nums: {...sel.nums},
            amount: amount, 
            odds: finalOdds, 
            status: 'PENDIENTE', 
            timestamp: Date.now()
        };
        db.ref('users/' + uid).set(localUserData);
        userSelections[betId] = { opts: [], nums: {} };
        notify("¡Apuesta registrada exitosamente!", "success");
    }

    // ==========================================
    // SISTEMA DE RESULTADOS Y DEVOLUCIONES
    // ==========================================

    function processResults(resultObj) {
        const betId = resultObj.betId;
        if (localUserData.history && localUserData.history[betId] && localUserData.history[betId].status === 'PENDIENTE') {
            const myBet = localUserData.history[betId];
            
            if (resultObj.cancelled) {
                myBet.status = 'CANCELADA';
                localUserData.balance += myBet.amount;
                notify(`Evento cancelado: ${myBet.question}. CR devueltos.`, "error");
            } else {
                // Logica de subconjunto para opciones normales (todas las que apostó el usuario deben haber ocurrido)
                let optsWin = true;
                if(myBet.opts && myBet.opts.length > 0) {
                    optsWin = myBet.opts.every(idx => (resultObj.winners || []).includes(idx));
                }

                // Logica para numeros y rangos
                let numsWin = true;
                if(myBet.nums) {
                    Object.keys(myBet.nums).forEach(i => {
                        let userVal = parseFloat(myBet.nums[i]);
                        let actualVal = parseFloat(resultObj.numResults[i]);
                        let optData = resultObj.optDetails ? resultObj.optDetails[i] : null;

                        if(optData && optData.type === 'range') {
                            // En la v1.6 se pidió que si el número real cae en el rango apostado?
                            // No, el admin valida un número, y si el usuario apostó dentro del rango.. 
                            // Corrección: El user elige un número DENTRO del rango. Si acierta el número exacto, gana. 
                            // Simplificación para cumplir estricto: Debe coincidir.
                            if(userVal !== actualVal) numsWin = false;
                        } else {
                            if(userVal !== actualVal) numsWin = false;
                        }
                    });
                }

                const isWin = optsWin && numsWin;
                myBet.status = isWin ? 'GANADA' : 'PERDIDA';
                
                if (isWin) {
                    localUserData.balance += (myBet.amount * myBet.odds);
                    notify(`¡HAS GANADO! +${(myBet.amount * myBet.odds).toFixed(3)} CR`, "success");
                } else {
                    notify(`Apuesta perdida: ${myBet.question}`, "error");
                }
            }
            db.ref('users/' + uid).set(localUserData);
        }
    }

    function saveEvent(isToQueue) {
        const questionInput = document.getElementById('adm-q-input').value;
        const isGlobalSingle = document.getElementById('adm-global-single').checked;
        let options = [];
        
        document.querySelectorAll('.creator-row').forEach(row => {
            let type = row.dataset.type;
            let name = row.querySelector('.o-name').value.trim();
            if(!name) return;

            if(type === 'section') {
                options.push({ type, name, isSingle: row.querySelector('.o-single').checked });
            } else if (type === 'number') {
                options.push({ type, name, baseNum: row.querySelector('.o-base').value, odds: row.querySelector('.o-odds').value });
            } else if (type === 'range') {
                options.push({ type, name, min: row.querySelector('.o-min').value, max: row.querySelector('.o-max').value, odds: row.querySelector('.o-odds').value });
            } else {
                options.push({ type, name, odds: row.querySelector('.o-odds').value || 1.100 });
            }
        });
        
        if (!questionInput || options.length === 0) return notify("Faltan datos", "error");
        
        const existingId = document.getElementById('edit-bet-id').value;
        const newBet = { 
            id: existingId || ('b_' + Date.now()), 
            question: questionInput, 
            isGlobalSingle: isGlobalSingle,
            options: options, 
            closeTime: document.getElementById('adm-close-time').value 
        };
        
        if (isToQueue) { 
            db.ref('queue/' + newBet.id).set(newBet); 
            notify(existingId ? "Actualizado en cola" : "Añadido a la cola", "success"); 
        } 
        else { 
            db.ref('activeBets/' + newBet.id).set(newBet); 
            notify(existingId ? "Evento actualizado" : "Evento activado", "success"); 
            // Eliminar de cola si estaba editando desde ahi
            if(existingId) db.ref('queue/' + existingId).remove();
        }
        
        // Reset
        document.getElementById('edit-bet-id').value = "";
        document.getElementById('adm-q-input').value = ""; 
        document.getElementById('adm-global-single').checked = false;
        document.getElementById('adm-options-list').innerHTML = "";
    }

    window.resolveSpecificBet = function(betId) {
        let winners = [];
        document.querySelectorAll(`.resolve-chk-${betId}`).forEach(chk => { if (chk.checked) winners.push(parseInt(chk.value)) });
        
        let numResults = {};
        document.querySelectorAll(`.resolve-num-${betId}`).forEach(inp => {
            if(inp.value !== "") numResults[inp.dataset.idx] = parseFloat(inp.value);
        });

        // Pasamos optDetails para verificar el tipo (range vs number) al procesar en los clientes
        let bet = globalData.activeBets[betId];
        let optDetails = {};
        if(bet && bet.options) {
            bet.options.forEach((o,i) => optDetails[i] = o);
        }

        let participants = 0;
        let correctGuesses = 0;
        
        Object.values(allUsersData).forEach(user => {
            if(user.history && user.history[betId] && user.history[betId].status === 'PENDIENTE') {
                participants++;
                let myBet = user.history[betId];
                
                // Mismo cálculo que en processResults para saber estadísticas previas
                let optsWin = true;
                if(myBet.opts) optsWin = myBet.opts.every(idx => winners.includes(idx));
                
                let numsWin = true;
                if(myBet.nums) {
                    Object.keys(myBet.nums).forEach(i => {
                        if(parseFloat(myBet.nums[i]) !== parseFloat(numResults[i])) numsWin = false;
                    });
                }

                if(optsWin && numsWin) correctGuesses++;
            }
        });

        db.ref('lastResults').set({ betId: betId, winners: winners, numResults: numResults, optDetails: optDetails, ts: Date.now() });
        db.ref('activeBets/' + betId).remove();
        
        notify(`✅ Evento cerrado. Acertaron ${correctGuesses} / ${participants} personas.`, "success");
    }

    window.deleteSpecificBet = function(betId) {
        if(!confirm("¿Seguro que quieres eliminar este evento? Se devolverán los créditos a todos los que hayan apostado.")) return;
        
        db.ref('lastResults').set({ betId: betId, cancelled: true, ts: Date.now() });
        db.ref('activeBets/' + betId).remove();
        notify("Evento eliminado y créditos devueltos.", "success");
    }

    function updateTimers() {
        let requiresRender = false;
        Object.keys(globalData.activeBets).forEach(betId => {
            const bet = globalData.activeBets[betId];
            const timerEl = document.getElementById(`timer-close-${betId}`);
            if (!bet.closeTime) { if (timerEl) timerEl.innerText = "SIN LÍMITE"; marketClosedStatus[betId] = false; return; }

            const diff = new Date(bet.closeTime) - new Date();
            if (diff <= 0) {
                if (!marketClosedStatus[betId]) { marketClosedStatus[betId] = true; requiresRender = true; }
                if (timerEl) timerEl.innerText = "MERCADO CERRADO";
            } else {
                marketClosedStatus[betId] = false;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);

                if (days >= 1) {
                    if (timerEl) timerEl.innerText = `CIERRA EN ${days}d ${hours}h ${mins}m ${secs}s`;
                } else {
                    const h = hours.toString().padStart(2, '0');
                    const m = mins.toString().padStart(2, '0');
                    const s = secs.toString().padStart(2, '0');
                    if (timerEl) timerEl.innerText = `CIERRA EN ${h}h ${m}m ${s}s`;
                }
            }
        });
        if (requiresRender) renderMain();
    }

    function renderHistory() {
        const container = document.getElementById('history-container');
        if (!localUserData.history || Object.keys(localUserData.history).length === 0) return container.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding: 40px 0;">No hay apuestas registradas.</p>';

        container.innerHTML = Object.values(localUserData.history).sort((a,b) => b.timestamp - a.timestamp).map(hist => {
            let color = 'var(--accent)'; 
            let moneyStr = `${hist.amount.toFixed(3)} CR`;
            
            if (hist.status === 'GANADA') { 
                color = 'var(--success)'; 
                moneyStr = `+${(hist.amount * hist.odds).toFixed(3)} CR`; 
            }
            if (hist.status === 'PERDIDA') { 
                color = 'var(--error)'; 
                moneyStr = `-${hist.amount.toFixed(3)} CR`; 
            }
            if (hist.status === 'CANCELADA') { 
                color = 'var(--text-muted)'; 
            }

            // Picks string retrocompatible
            let picksStr = Array.isArray(hist.picks) ? hist.picks.join(' | ') : 'Opciones antiguas';

            return `
            <div class="hist-item">
                <div style="flex:1; padding-right: 15px;">
                    <strong style="font-size: 1.1rem; display: block; margin-bottom: 5px;">${hist.question}</strong>
                    <span style="color:var(--text-muted); font-size: 0.85rem;">
                        ${picksStr} <br> Cuota x${hist.odds.toFixed(3)}
                    </span>
                    <button class="btn btn-ghost" onclick="deleteFromHistory('${hist.id}', '${hist.status}', ${hist.amount})" style="margin-top:10px; font-size:0.7rem; padding: 5px 10px; border:1px solid var(--border); color:var(--text-muted);">🗑️ Borrar</button>
                </div>
                <div style="text-align:right; border-left: 1px solid var(--border); padding-left: 15px;">
                    <span style="color:${color}; font-weight: 800; font-size: 0.8rem; text-transform: uppercase;">${hist.status}</span><br>
                    <strong style="font-size: 1.3rem; color:${color};">${moneyStr}</strong> 
                </div>
            </div>`;
        }).join('');
    }

    // Borrar historial / Cancelar si es PENDIENTE
    window.deleteFromHistory = function(betId, status, amount) {
        if(status === 'PENDIENTE') {
            if(marketClosedStatus[betId]) {
                return notify("No puedes cancelar, el mercado ya está cerrado.", "error");
            }
            if(confirm("¿Seguro que quieres CANCELAR esta apuesta? Se te devolverán los créditos y podrás volver a apostar.")) {
                localUserData.balance += amount;
                delete localUserData.history[betId];
                db.ref('users/' + uid).set(localUserData);
                notify("Apuesta cancelada. Créditos devueltos.", "success");
            }
        } else {
            // Solo borrar del historial visual (ya procesada)
            if(confirm("¿Eliminar este registro de tu historial?")) {
                delete localUserData.history[betId];
                db.ref('users/' + uid).set(localUserData);
            }
        }
    }

    function notify(message, type = "success") {
        const container = document.getElementById('notification-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`; toast.innerText = (type === "success" ? "✅ " : "❌ ") + message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; setTimeout(() => toast.remove(), 400); }, 4000);
    }

    setInterval(updateTimers, 1000);

</script>
</body>
</html>
